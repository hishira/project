@if (isEmpty()) {
  <div class="d-flex flex-column justify-content-center align-items-center">
    <mat-icon
      aria-hidden="false"
      aria-label="Empty state icon"
      fontIcon="sentiment_dissatisfied"
      style="display: block; font-size: 12rem; width: fit-content; height: fit-content" />
    <div class="h5 fw-bolder">
        {{ label() }}
    </div>
  </div>
} @else {
  <ng-content />
}
