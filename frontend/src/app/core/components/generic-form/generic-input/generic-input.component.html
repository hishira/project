@switch (inputType()) {
  @default {
    <app-text-input
      [formControl]="control()"
      [icon]="genericInput().icon"
      [inputType]="genericInput().textInputType || 'text'"
      [inputValidation]="genericInput().validators"
      [label]="genericInput().label"
      [placeholder]="genericInput().placeholder"
    />
  }
}
