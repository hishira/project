@if (addressFormGroup) {
  <ng-container [formGroup]="addressFormGroup">
    <div class="flex__container">
      <mat-form-field class="example-full-width" [appearance]="controlType()">
        <mat-label>Ulica i nr</mat-label>
        <input formControlName="street" matInput value="Google" />
        <mat-error>
          <crm-errors [control]="addressFormGroup.get('street')" />
        </mat-error>
      </mat-form-field>
      <mat-form-field class="example-full-width" [appearance]="controlType()">
        <mat-label>Address korespondencyjny</mat-label>
        <input formControlName="secondAddress" matInput />
        <mat-error>
          <crm-errors [control]="addressFormGroup.get('secondAddress')" />
        </mat-error>
      </mat-form-field>
    </div>
    <div class="flex__container">
      <mat-form-field class="example-full-width" [appearance]="controlType()">
        <mat-label>Kod pocztowy</mat-label>
        <input formControlName="postalCode" matInput />
        <mat-error>
          <crm-errors [control]="addressFormGroup.get('postalCode')" />
        </mat-error>
      </mat-form-field>
      <mat-form-field class="example-full-width" [appearance]="controlType()">
        <mat-label>Miasto</mat-label>
        <input formControlName="city" matInput />
        <mat-error>
          <crm-errors [control]="addressFormGroup.get('city')" />
        </mat-error>
      </mat-form-field>
    </div>
    <div class="flex__container">
      <div class="example-full-width">
        <!--TODO: Fix with mat-input -->
        <crm-selectable
          formControlName="zone"
          label="Województwo"
          [outlineControl]="outlineControl()"
          [selectableConfig]="selectableConfig"
          [validators]="this.addressValidatorObject()?.zone ?? []"
          [values]="zones" />
      </div>
      <mat-form-field class="example-full-width" [appearance]="controlType()">
        <mat-label>Rejon</mat-label>
        <input formControlName="region" matInput />
        <mat-error>
          <crm-errors [control]="addressFormGroup.get('region')" />
        </mat-error>
      </mat-form-field>
    </div>
    <!--TODO: Map to country name, np: PL -> Poland | Polska-->
    <mat-form-field class="example-full-width" style="width: calc(50% - 1rem)" [appearance]="controlType()">
      <mat-label>Kraj</mat-label>
      <input formControlName="country" matInput />
      <mat-error>
        <crm-errors [control]="addressFormGroup.get('country')" />
      </mat-error>
    </mat-form-field>
  </ng-container>
}
