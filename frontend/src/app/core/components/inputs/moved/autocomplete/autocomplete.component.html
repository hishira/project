<mat-form-field class="example-full-width">
  <mat-label>{{ label() }}</mat-label>
  <input
    crm-parse-value-input
    matInput
    type="text"
    [dataVariable]="'value'"
    [formControl]="formControl"
    [matAutocomplete]="auto" />
  <mat-autocomplete #auto="matAutocomplete">
    @for (option of options | async) {
      <mat-option [value]="option.controlData">
        {{ option.viewData }}
      </mat-option>
    }
  </mat-autocomplete>
</mat-form-field>
