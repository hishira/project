<div class="d-flex gap-3">
  @for (filter of filters(); track filter.filterType) {
    @switch (filter.filterType) {
      @case (FilterType.Selectable) {
        <app-selectable-filter [filter]="filter" />
      }
      @case (FilterType.Date) {
        <app-date-filter [filter]="filter" />
      }
      @default {
        TEST
      }
    }
  }
</div>
<div>
  <app-filter-chips/>
</div>
