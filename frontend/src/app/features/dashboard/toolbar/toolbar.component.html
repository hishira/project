  <mat-toolbar color="primary" class="dashboard-toolbar">
    <div class="toolbar-content">
      <div class="app-title">
        <mat-icon class="title-icon">sports</mat-icon>
        <span class="app-title-text">Sports Activity Diary</span>
      </div>
      
      <div class="user-menu">
        <span class="welcome-text">Welcome, {{currentUser?.firstName || currentUser?.login}}!</span>
        <span class="welcome-text-short">Hi {{currentUser?.firstName || currentUser?.login}}!</span>
        <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item routerLink="/dashboard">
            <mat-icon>dashboard</mat-icon>
            <span>Dashboard</span>
          </button>
          <button mat-menu-item routerLink="/activities">
            <mat-icon>list</mat-icon>
            <span>Activities</span>
          </button>
          <button mat-menu-item routerLink="/statistics">
            <mat-icon>bar_chart</mat-icon>
            <span>Statistics</span>
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </div>
    </div>
  </mat-toolbar>
