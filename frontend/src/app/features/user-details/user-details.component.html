<app-page-header>
  <div class="main-header d-flex gap-2">
    {{ userName() }}
    <mat-chip>{{ userRole() }}</mat-chip>
    <mat-chip [class]="currentStateClass()">{{ userState() | titlecase }}</mat-chip>
  </div>
  <div class="main-header-buttons">
    <button class="text-bg-danger" matButton type="button">Delete</button>
  </div>
</app-page-header>
<app-main-page-view>
  <app-user-general-information [user]="currentUser()" />
  <div class="mt-3"></div>
  <mat-card>
    <mat-card-content>
      <app-empty-state [isEmpty]="false" [label]="'No agreements found'">
        <app-user-agreements />
      </app-empty-state>
    </mat-card-content>
  </mat-card>
</app-main-page-view>
