<app-page-header>
  <div class="main-header">User {{ userName() }}</div>
  <div class="main-header-buttons">
    <button matButton type="button">Edit</button>
    <button matButton type="button">Delete</button>
  </div>
</app-page-header>
<app-main-page-view>
  <mat-card>
    <mat-card-header>General information</mat-card-header>
    <mat-card-content class="mt-2">
      <div class="d-flex gap-5">
        <div class="col-2">
          <app-read-only label="Name">{{ currentUser().firstName }}</app-read-only>
        </div>
        <div class="col-2">
          <app-read-only label="Last name">{{ currentUser().lastName }}</app-read-only>
        </div>
        <div class="col-2">
          <app-read-only label="Address">{{ currentAddress() }}</app-read-only>
        </div>
      </div>
      <div *isAdmin class="d-flex gap-5 mt-2">
        <div class="col-2">
          <app-read-only label="Login">{{ userCredentials().login }}</app-read-only>
        </div>
        <div class="col-2">
          <app-read-only label="Email">{{ userCredentials().email }}</app-read-only>
        </div>
        <div class="col-2">
          <app-read-only label="Role">{{ currentUser().role }}</app-read-only>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
  <div class="mt-3"></div>
  <mat-card>
    <mat-card-header> Agreements </mat-card-header>
    <mat-card-content>
      <app-empty-state [isEmpty]="true" [label]="'No agreements found'">
        Agreements will be displayed here when assigned to the user.
      </app-empty-state>
    </mat-card-content>
  </mat-card>
</app-main-page-view>
