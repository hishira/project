<mat-card class="inner-card">
  <mat-card-header>
    <mat-card-title>Kamienie milowe</mat-card-title>
    <button mat-stroked-button (click)="addMilestone.emit()">Dodaj kamień</button>
  </mat-card-header>
  <mat-card-content>
    <mat-list>
      @for (m of milestones(); track m.id) {
        <mat-list-item class="milestone-item">
          <div class="milestone-row">
            <mat-icon [class.completed]="m.completed">{{
              m.completed ? 'check_circle' : 'radio_button_unchecked'
            }}</mat-icon>
            <div class="milestone-info">
              <span class="milestone-name">{{ m.name }}</span>
              <span class="milestone-date">{{ m.dueDate | date: 'dd MMM yyyy' }}</span>
            </div>
            @if (m.completed && m.completedAt) {
              <span class="completed-date">ukończono {{ m.completedAt | date: 'dd MMM' }}</span>
            }
          </div>
        </mat-list-item>
      }
    </mat-list>
  </mat-card-content>
</mat-card>
