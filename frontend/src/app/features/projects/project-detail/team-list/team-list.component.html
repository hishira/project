<mat-card class="inner-card">
  <mat-card-header>
    <mat-card-title>Zespół projektowy</mat-card-title>
    <button mat-stroked-button (click)="addMember.emit()">Dodaj członka</button>
  </mat-card-header>
  <mat-card-content>
    <mat-list>
      @for (member of team(); track member.userId) {
        <mat-list-item class="team-item">
          <div class="team-row">
            <img [src]="member.avatarUrl" alt="avatar" class="avatar" />
            <div class="member-info">
              <span class="member-name">{{ member.fullName }}</span>
              <span class="member-role">{{ member.role }}</span>
            </div>
            <span class="member-allocation">{{ member.allocation }}%</span>
          </div>
        </mat-list-item>
      }
    </mat-list>
  </mat-card-content>
</mat-card>
