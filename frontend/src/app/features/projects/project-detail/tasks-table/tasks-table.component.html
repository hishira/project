<mat-card class="inner-card">
  <mat-card-header>
    <mat-card-title>Lista zadań</mat-card-title>
    <button mat-stroked-button (click)="addTask.emit()">Dodaj zadanie</button>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="tasks()" class="tasks-table">
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Zadanie</th>
        <td mat-cell *matCellDef="let t">{{ t.title }}</td>
      </ng-container>

      <ng-container matColumnDef="assignee">
        <th mat-header-cell *matHeaderCellDef>Przypisane</th>
        <td mat-cell *matCellDef="let t">{{ t.assigneeName || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let t">
          <mat-chip [class]="getStatusClass(t.status)" class="task-status">
            {{ getStatusLabel(t.status) }}
          </mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="hours">
        <th mat-header-cell *matHeaderCellDef>Godziny (est/rzecz)</th>
        <td mat-cell *matCellDef="let t">{{ t.estimatedHours || 0 }} / {{ t.actualHours || 0 }}</td>
      </ng-container>

      <ng-container matColumnDef="dueDate">
        <th mat-header-cell *matHeaderCellDef>Termin</th>
        <td mat-cell *matCellDef="let t">{{ t.dueDate | date: 'dd MMM' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let t">
          <button mat-icon-button (click)="editTask.emit(t.id)" matTooltip="Edytuj">
            <mat-icon>edit</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </mat-card-content>
</mat-card>
