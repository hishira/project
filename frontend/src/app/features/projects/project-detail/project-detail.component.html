<div class="detail-container">
  <div class="header">
    <a mat-icon-button routerLink="/projects" class="back-btn">
      <mat-icon>arrow_back</mat-icon>
    </a>
    <h1>Szczegóły projektu</h1>
  </div>

  @if (project(); as p) {
    <div class="content">
      <!-- Górna karta z podsumowaniem -->
      <app-project-summary
        [name]="p.name"
        [status]="p.status"
        [clientName]="p.clientName"
        [startDate]="p.startDate"
        [endDate]="p.endDate"
        [budgetSpent]="p.budget.spent"
        [budgetTotal]="p.budget.total"
        [budgetCurrency]="p.budget.currency"
        [progress]="calculateProgress(p)"
        [description]="p.description" />

      <!-- Zakładki -->
      <mat-tab-group class="detail-tabs" animationDuration="0ms">
        <!-- Przegląd (zespół, ogólne) -->
        <mat-tab label="Przegląd">
          <div class="tab-content">
            <app-team-list [team]="p.team" (addMember)="onAddTask()" />
          </div>
        </mat-tab>

        <!-- Zadania -->
        <mat-tab label="Zadania">
          <div class="tab-content">
            <app-tasks-table
              [tasks]="p.tasks"
              (addTask)="onAddTask()"
              (editTask)="onEditTask($event)" />
          </div>
        </mat-tab>

        <!-- Harmonogram (kamienie milowe) -->
        <mat-tab label="Harmonogram">
          <div class="tab-content">
            <app-milestones-list
              [milestones]="p.milestones"
              (addMilestone)="onAddMilestone()" />
          </div>
        </mat-tab>

        <!-- Budżet -->
        <mat-tab label="Budżet">
          <div class="tab-content">
            <app-budget-table
              [items]="p.budget.items ?? []"
              [total]="p.budget.total"
              [spent]="p.budget.spent"
              [currency]="p.budget.currency" />
          </div>
        </mat-tab>

        <!-- Raporty -->
        <mat-tab label="Raporty">
          <div class="tab-content">
            <mat-card class="inner-card">
              <mat-card-header>
                <mat-card-title>Raporty postępu</mat-card-title>
              </mat-card-header>
              <mat-card-content>
                <div class="report-actions">
                  <button mat-raised-button color="primary" (click)="onGenerateReport()">
                    <mat-icon>assessment</mat-icon> Generuj raport PDF
                  </button>
                  <button mat-stroked-button (click)="onGenerateReport()">
                    <mat-icon>show_chart</mat-icon> Podgląd statystyk
                  </button>
                </div>
              </mat-card-content>
            </mat-card>
          </div>
        </mat-tab>
      </mat-tab-group>
    </div>
  } @else {
    <div class="not-found">
      <mat-icon>error_outline</mat-icon>
      <p>Nie znaleziono projektu o podanym ID</p>
      <button mat-raised-button color="primary" routerLink="/projects">Powrót do listy</button>
    </div>
  }
</div>
