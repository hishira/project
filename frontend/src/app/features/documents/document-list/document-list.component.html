<app-page-header>
  <div class="header main-header">
    <h1>Dokumenty</h1>
  </div>
  <div class="main-header-buttons">
    <button mat-raised-button color="primary" routerLink="new">
      <mat-icon>add</mat-icon> Prześlij dokument
    </button>
  </div>
</app-page-header>

<app-main-page-view>
  <div class="list-container">
    <!-- Panel filtrów -->
    <app-document-filters
      [filterType]="filterType()"
      [filterClient]="filterClient()"
      [filterDateFrom]="filterDateFrom()"
      [filterDateTo]="filterDateTo()"
      (filterTypeChange)="onFilterTypeChange($event)"
      (filterClientChange)="onFilterClientChange($event)"
      (filterDateFromChange)="onFilterDateFromChange($event)"
      (filterDateToChange)="onFilterDateToChange($event)"
      (clearFilters)="clearFilters()" />

    <!-- Tabela dokumentów -->
    <mat-card>
      <mat-card-content>
        <table mat-table [dataSource]="dataSource()" matSort class="document-table">
          <!-- Typ (ikona) -->
          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="type">Typ</th>
            <td mat-cell *matCellDef="let doc">
              <app-document-type-icon [type]="doc.type" />
            </td>
          </ng-container>

          <!-- Nazwa -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="name">Nazwa dokumentu</th>
            <td mat-cell *matCellDef="let doc">
              <app-document-name-cell [id]="doc.id" [name]="doc.name" [version]="doc.version" />
            </td>
          </ng-container>

          <!-- Klient -->
          <ng-container matColumnDef="client">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="clientName">Klient</th>
            <td mat-cell *matCellDef="let doc">{{ doc.clientName }}</td>
          </ng-container>

          <!-- Data dodania -->
          <ng-container matColumnDef="uploaded">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="uploadedAt">Dodano</th>
            <td mat-cell *matCellDef="let doc">{{ doc.uploadedAt | date: 'dd MMM yyyy' }}</td>
          </ng-container>

          <!-- Rozmiar -->
          <ng-container matColumnDef="size">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="fileSize">Rozmiar</th>
            <td mat-cell *matCellDef="let doc">{{ doc.fileSize | number }} B</td>
          </ng-container>

          <!-- Wersja -->
          <ng-container matColumnDef="version">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="version">Wersja</th>
            <td mat-cell *matCellDef="let doc">{{ doc.version || '-' }}</td>
          </ng-container>

          <!-- Akcje -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let doc">
              <app-document-actions [id]="doc.id" [approved]="doc.approved" />
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns" [routerLink]="[row.id]" class="clickable-row"></tr>

          <!-- Gdy brak danych -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length">
              <div class="no-data">Brak dokumentów spełniających kryteria</div>
            </td>
          </tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25, 50]" showFirstLastButtons></mat-paginator>
      </mat-card-content>
    </mat-card>
  </div>
</app-main-page-view>
