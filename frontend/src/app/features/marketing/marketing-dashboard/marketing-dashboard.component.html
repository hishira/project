<app-page-header>
  <div class="main-header">
    <h1>Marketing Dashboard</h1>
  </div>
  <div class="main-header-buttons">
    <button mat-raised-button color="primary" routerLink="campaigns/new">
      <mat-icon>add</mat-icon> Nowa kampania
    </button>
  </div>
</app-page-header>

<app-main-page-view>
  <div class="dashboard-container">
    <!-- Karty z podsumowaniem -->
    <div class="stats-grid">
      <app-stat-card
        icon="campaign"
        [value]="summary.totalCampaigns"
        label="Wszystkie kampanie" />

      <app-stat-card
        icon="play_circle"
        [value]="summary.activeCampaigns"
        label="Aktywne kampanie" />

      <app-stat-card
        icon="people"
        [value]="summary.totalRecipients.toString()"
        label="Łącznie odbiorców" />

      <app-stat-card
        icon="bar_chart"
        [value]="summary.averageOpenRate + '%'"
        label="Średnia otwarć" />

      <app-stat-card
        icon="mouse"
        [value]="summary.averageClickRate + '%'"
        label="Średnia kliknięć" />

      <app-stat-card
        icon="segment"
        [value]="summary.segmentsCount"
        label="Segmenty" />

      <app-stat-card
        icon="description"
        [value]="summary.templatesCount"
        label="Szablony" />
    </div>

    <!-- Dwie kolumny: ostatnie kampanie i najlepsze kampanie -->
    <div class="dashboard-row">
      <app-recent-campaigns-list [campaigns]="summary.recentCampaigns" />
      <app-top-performing-list [campaigns]="summary.topPerforming" />
    </div>
  </div>
</app-main-page-view>
