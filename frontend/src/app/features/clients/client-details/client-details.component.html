@if (client(); as c) {
  <app-page-header>
    <div class="main-header">
      <h1>Profil klienta: {{ c.name }}</h1>
    </div>
    <div class="main-header-buttons">
      <button mat-stroked-button color="primary" aria-label="Edytuj klienta {{ c.name }}">
        <mat-icon aria-hidden="true">edit</mat-icon> Edytuj
      </button>
    </div>
  </app-page-header>

  <app-main-page-view>
    <div class="detail-container">
      <div class="content">
        <!-- Dane klienta -->
        <app-client-info [client]="c" />

        <!-- Osoby kontaktowe -->
        <app-client-contacts [contacts]="c.contacts" />

        <!-- Powiązane dokumenty -->
        <app-client-documents [documents]="clientDocuments()" [clientId]="c.id" />
      </div>
    </div>
  </app-main-page-view>
} @else {
  <div class="not-found" role="alert">
    <mat-icon aria-hidden="true">error_outline</mat-icon>
    <p>Nie znaleziono klienta o podanym ID</p>
    <button mat-raised-button color="primary" routerLink="/clients">Powrót do listy klientów</button>
  </div>
}
