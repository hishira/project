<app-page-header>
  <div class="main-header">
    <div class="d-flex align-items-center gap-3">
      <h1>Lista ticketów</h1>
    </div>
  </div>
</app-page-header>
<app-main-page-view>
  <div class="ticket-list-container">
    <div class="list-header">
      <button color="primary" mat-button type="button" (click)="ticketService.toggleAll(true)">
        <mat-icon>check_box</mat-icon> Zaznacz wszystkie
      </button>
      <button color="warn" mat-button type="button" (click)="ticketService.toggleAll(false)">
        <mat-icon>check_box_outline_blank</mat-icon> Odznacz wszystkie
      </button>
    </div>

    @if (isLoading()) {
      <div class="loading-spinner d-flex align-items-center justify-content-center flex-column gap-4">
        <mat-spinner diameter="40" />
        <p>Ładowanie ticketów...</p>
      </div>
    }

    @if (error(); as err) {
      <div class="error-message">
        <mat-icon>error</mat-icon>
        <span>Nie udało się załadować ticketów: {{ err.message }}</span>
        <button color="primary" mat-button (click)="ticketsResource.reload()">Spróbuj ponownie</button>
      </div>
    }

    @if (!isLoading() && !error() && tickets(); as ticketList) {
      <div class="tickets">
        @for (ticket of ticketList; track ticket.id) {
          <app-ticket-item
            [ticket]="ticket"
            (expand)="onExpandTicket(ticket)"
            (collapse)="onCollapseTicket(ticket)"
            (toggleSelection)="onToggleSelection(ticket)"
            (edit)="onEditTicket(ticket)"
            (details)="onDetailsTicket(ticket)"
            (assign)="onAssignTicket(ticket)"
            (changeStatus)="onChangeStatus(ticket, $event)" />
        }
      </div>
    }
  </div>
</app-main-page-view>
