@if (agreement()) {
  <app-page-header>
    <div class="main-header d-flex gap-2">Agreement {{ agreement().title }}</div>
    <div class="main-header-buttons"></div>
  </app-page-header>

  <app-main-page-view>
    <div class="agreement-details">
      <!-- Nagłówek umowy -->
      <app-agreement-summary [agreement]="agreement()" />

      <div class="row">
        <!-- Lewa kolumna -->
        <div class="col-md-6">
          <!-- Informacje o produkcie -->
          <app-agreement-product-info [agreement]="agreement()" />

          <!-- Strony umowy -->
          <app-agreement-parties [agreement]="agreement()" />
        </div>

        <!-- Prawa kolumna -->
        <div class="col-md-6">
          <!-- Harmonogram płatności -->
          <app-payment-schedule />

          <!-- Podpisy i ocena ryzyka -->
          <app-agreement-signatures-risk [agreement]="agreement()" />

          <!-- Tagi -->
          <app-agreement-tags [agreement]="agreement()" />
        </div>
      </div>

      <app-agreement-actions />
    </div>
  </app-main-page-view>
}
