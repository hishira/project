<div class="list-container">
  <div class="header">
    <h1>Onboarding klientów</h1>
    <button mat-raised-button color="primary">
      <mat-icon>add</mat-icon> Nowy onboarding
    </button>
  </div>

  <div class="grid">
    @for (item of list; track item.id) {
      <mat-card class="onboarding-card" [routerLink]="[item.id]">
        <mat-card-header>
          <mat-card-title>{{ item.clientName }}</mat-card-title>
          <mat-card-subtitle>
            Rozpoczęcie: {{ item.startDate | date:'dd MMM yyyy' }}
          </mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <div class="progress-section">
            <div class="progress-header">
              <span class="progress-label">Postęp</span>
              <span class="progress-value">{{ item.progress }}%</span>
            </div>
            <mat-progress-bar mode="determinate" [value]="item.progress"></mat-progress-bar>
          </div>
          <mat-chip [class]="getStatusClass(item.status)" class="status-chip">
            {{ getStatusLabel(item.status) }}
          </mat-chip>
        </mat-card-content>
      </mat-card>
    } @empty {
      <div class="empty-state">
        <mat-icon>assignment</mat-icon>
        <p>Brak aktywnych onboardingów.</p>
      </div>
    }
  </div>
</div>
