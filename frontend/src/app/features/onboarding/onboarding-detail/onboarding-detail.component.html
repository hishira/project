<app-page-header>
  <div class="header main-header">
    <h1>Onboarding: {{ onboarding()?.clientName }}</h1>
  </div>
  <div class="main-header-buttons">
    <button mat-stroked-button (click)="sendReminder()"><mat-icon>notifications</mat-icon> Wyślij przypomnienie</button>
  </div>
</app-page-header>
<app-main-page-view>
  <div class="detail-container">
    @if (onboarding(); as onb) {
      <div class="content">
        <!-- Karta podsumowania -->
        <app-onboarding-summary [onboarding]="onb" />

        <!-- Zakładki -->
        <mat-tab-group class="detail-tabs">
          <mat-tab label="Zadania">
            <app-onboarding-tasks-tab 
              [tasks]="onb.tasks" 
              (toggleTask)="toggleTask($event)" />
          </mat-tab>

          <mat-tab label="Materiały szkoleniowe">
            <app-onboarding-materials-tab 
              [materials]="onb.materials" 
              (markViewed)="markMaterialViewed($event)" />
          </mat-tab>

          <mat-tab label="Webinary">
            <app-onboarding-webinars-tab 
              [webinars]="onb.webinars" 
              (register)="registerForWebinar($event)" />
          </mat-tab>
        </mat-tab-group>
      </div>
    } @else {
      <div class="not-found">
        <mat-icon>error_outline</mat-icon>
        <p>Nie znaleziono onboardingu</p>
        <button mat-raised-button color="primary" routerLink="/onboarding">Powrót do listy</button>
      </div>
    }
  </div>
</app-main-page-view>
