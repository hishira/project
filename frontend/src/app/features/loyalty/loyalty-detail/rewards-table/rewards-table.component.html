@if (rewards().length) {
  <table mat-table [dataSource]="rewards()" class="rewards-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nazwa</th>
      <td mat-cell *matCellDef="let r">{{ r.name }}</td>
    </ng-container>

    <ng-container matColumnDef="pointsCost">
      <th mat-header-cell *matHeaderCellDef>Koszt punktów</th>
      <td mat-cell *matCellDef="let r">{{ r.pointsCost }}</td>
    </ng-container>

    <ng-container matColumnDef="discount">
      <th mat-header-cell *matHeaderCellDef>Rabat</th>
      <td mat-cell *matCellDef="let r">
        {{ r.discount }}{{ r.discountType === 'percentage' ? '%' : ' PLN' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Kod</th>
      <td mat-cell *matCellDef="let r">
        <span class="coupon-code">{{ r.code }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="expiresAt">
      <th mat-header-cell *matHeaderCellDef>Ważny do</th>
      <td mat-cell *matCellDef="let r">{{ r.expiresAt | date: 'dd MMM yyyy' }}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let r">
        <button mat-icon-button (click)="onRedeem(r)" matTooltip="Wykorzystaj">
          <mat-icon>shopping_cart</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
} @else {
  <div class="empty-state">Brak dostępnych nagród.</div>
}
