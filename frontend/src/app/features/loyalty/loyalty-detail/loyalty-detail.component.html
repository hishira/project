<app-page-header>
  <div class="header main-header">
    <h1>Program lojalnościowy – {{ customer()?.customerName }}</h1>
  </div>
</app-page-header>

<app-main-page-view>
  <div class="detail-container">
    @if (customer(); as c) {
      <div class="content">
        <!-- Podsumowanie -->
        <mat-card class="summary-card">
          <mat-card-header>
            <mat-card-title>Podsumowanie</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div class="summary-grid">
              <app-level-summary-badge [level]="c.level" />
              <app-points-summary label="Dostępne punkty" [value]="c.points" />
              <app-points-summary label="Zdobyte łącznie" [value]="c.lifetimePoints" />
            </div>
            @if (c.nextLevelThreshold) {
              <app-detail-progress
                [points]="c.points"
                [nextLevelThreshold]="c.nextLevelThreshold"
                [pointsToNextLevel]="c.pointsToNextLevel"
                [isMaxLevel]="c.level === 'platinum'" />
            }
          </mat-card-content>
          <mat-card-actions align="end">
            <button mat-stroked-button (click)="onAddPoints()">
              <mat-icon>add</mat-icon>
              Dodaj punkty
            </button>
          </mat-card-actions>
        </mat-card>

        <!-- Zakładki: Nagrody, Historia transakcji -->
        <mat-tab-group class="detail-tabs">
          <mat-tab label="Dostępne nagrody">
            <div class="tab-content">
              <mat-card class="inner-card">
                <mat-card-header>
                  <mat-card-title>Nagrody do wykorzystania</mat-card-title>
                  <button mat-stroked-button (click)="onGenerateReward()">
                    <mat-icon>add</mat-icon>
                    Generuj nową
                  </button>
                </mat-card-header>
                <mat-card-content>
                  <app-rewards-table [rewards]="c.rewards" (redeem)="onRedeem($event)" />
                </mat-card-content>
              </mat-card>
            </div>
          </mat-tab>

          <mat-tab label="Historia transakcji">
            <div class="tab-content">
              <mat-card class="inner-card">
                <mat-card-header>
                  <mat-card-title>Ruch punktów</mat-card-title>
                </mat-card-header>
                <mat-card-content>
                  <app-transactions-table [transactions]="c.transactions" />
                </mat-card-content>
              </mat-card>
            </div>
          </mat-tab>
        </mat-tab-group>
      </div>
    } @else {
      <div class="not-found">
        <mat-icon>error_outline</mat-icon>
        <p>Nie znaleziono klienta w programie lojalnościowym</p>
        <button mat-raised-button color="primary" routerLink="/loyalty">Powrót do listy</button>
      </div>
    }
  </div>
</app-main-page-view>
