<table mat-table [dataSource]="transactions()" class="transactions-table">
  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef>Data</th>
    <td mat-cell *matCellDef="let t">{{ t.date | date: 'dd MMM yyyy' }}</td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>Opis</th>
    <td mat-cell *matCellDef="let t">{{ t.description }}</td>
  </ng-container>

  <ng-container matColumnDef="pointsChange">
    <th mat-header-cell *matHeaderCellDef>Zmiana</th>
    <td mat-cell *matCellDef="let t" [style.color]="getPointsChangeColor(t.pointsChange)">
      {{ formatPointsChange(t.pointsChange) }}
    </td>
  </ng-container>

  <ng-container matColumnDef="balanceAfter">
    <th mat-header-cell *matHeaderCellDef>Saldo</th>
    <td mat-cell *matCellDef="let t">{{ t.balanceAfter }}</td>
  </ng-container>

  <ng-container matColumnDef="source">
    <th mat-header-cell *matHeaderCellDef>Źródło</th>
    <td mat-cell *matCellDef="let t">
      <mat-chip class="source-chip">{{ t.source }}</mat-chip>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
