<app-page-header>
  <div class="header main-header">
    <h1>Program lojalnościowy</h1>
  </div>
  <div class="main-header-buttons">
    <button mat-raised-button color="primary" (click)="onAdd()">
      <mat-icon>add</mat-icon>
      Dodaj klienta
    </button>
  </div>
</app-page-header>

<app-main-page-view>
  <div class="loyalty-container">
    <!-- Poziomy członkostwa – karty informacyjne -->
    <div class="levels-grid">
      @for (level of levels; track level.name) {
        <app-level-card [level]="$any(level)" />
      }
    </div>

    <!-- Lista klientów -->
    <mat-card class="customers-card">
      <mat-card-header>
        <mat-card-title>Klienci w programie</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <table mat-table [dataSource]="customers()" class="customers-table">
          <ng-container matColumnDef="customer">
            <th mat-header-cell *matHeaderCellDef>Klient</th>
            <td mat-cell *matCellDef="let c">
              <app-customer-cell [customer]="c" />
            </td>
          </ng-container>

          <ng-container matColumnDef="level">
            <th mat-header-cell *matHeaderCellDef>Poziom</th>
            <td mat-cell *matCellDef="let c">
              <app-level-badge [level]="c.level" />
            </td>
          </ng-container>

          <ng-container matColumnDef="points">
            <th mat-header-cell *matHeaderCellDef>Punkty</th>
            <td mat-cell *matCellDef="let c">
              <strong>{{ c.points }}</strong>
              <span class="lifetime-points">/ {{ c.lifetimePoints }} (życiowe)</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="nextLevel">
            <th mat-header-cell *matHeaderCellDef>Postęp</th>
            <td mat-cell *matCellDef="let c">
              <app-progress-bar
                [points]="c.points"
                [nextLevelThreshold]="c.nextLevelThreshold"
                [level]="c.level" />
            </td>
          </ng-container>

          <ng-container matColumnDef="rewards">
            <th mat-header-cell *matHeaderCellDef>Nagrody</th>
            <td mat-cell *matCellDef="let c">{{ c.rewards.length }} dostępnych</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let c">
              <button
                mat-icon-button
                [routerLink]="[c.customerId]"
                matTooltip="Szczegóły"
                (click)="$event.stopPropagation()">
                <mat-icon>visibility</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
            [routerLink]="[row.customerId]"
            class="clickable-row"></tr>
        </table>
      </mat-card-content>
    </mat-card>
  </div>
</app-main-page-view>
