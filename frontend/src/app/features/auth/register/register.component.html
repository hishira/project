<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header class="w-100">
      <mat-card-title class="w-100">
        <div class="auth-header w-100">
          <mat-icon class="auth-icon">admin_panel_settings</mat-icon>
          <h1>Sports Activity Diary</h1>
        </div>
      </mat-card-title>
      <mat-card-subtitle class="d-flex justify-content-center">
        <div class="mt-4">Create your account</div>
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="name-row">
          <app-text-input
            formControlName="firstName"
            icon="person"
            label="First Name"
            placeholder="Enter your first name"
            [errorsMap]="formErrors.firstName" />
          <app-text-input
            formControlName="lastName"
            icon="person"
            label="Last Name"
            placeholder="Enter your last name"
            [errorsMap]="formErrors.lastName" />
        </div>
        <app-text-input
          formControlName="login"
          icon="account_circle"
          label="Username"
          placeholder="Choose a username"
          [errorsMap]="formErrors.login" />
        <app-text-input
          formControlName="email"
          icon="email"
          inputType="email"
          label="Email"
          placeholder="Enter your email"
          [errorsMap]="formErrors.email" />
        <app-text-input
          formControlName="password"
          inputType="password"
          label="Password"
          placeholder="Enter your password"
          [errorsMap]="formErrors.password" />
        <app-text-input
          formControlName="confirmPassword"
          inputType="password"
          label="Confirm Password"
          placeholder="Confirm your password"
          [errorsMap]="formErrors.confirmPassword" />
        <button
          class="full-width auth-button"
          color="primary"
          mat-raised-button
          type="submit"
          [disabled]="registerForm.invalid || isLoading()">
          @if (isLoading()) {
            <mat-spinner diameter="20"></mat-spinner>
          }
          @if (!isLoading()) {
            <span>Sign Up</span>
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions class="auth-actions">
      <p>
        Already have an account?
        <a class="auth-link" routerLink="/auth/login">Sign in</a>
      </p>
    </mat-card-actions>
  </mat-card>
</div>
