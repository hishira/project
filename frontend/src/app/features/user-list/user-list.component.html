@let data = users();
<mat-card>
  <mat-card-content>
    <app-table-filtering [filters]="filters" />
    <table mat-table [dataSource]="data">
      <ng-container matColumnDef="id">
        <th *matHeaderCellDef mat-header-cell>ID</th>
        <td *matCellDef="let user" mat-cell>{{ user.id }}</td>
      </ng-container>

      <ng-container matColumnDef="firstName">
        <th *matHeaderCellDef mat-header-cell>First Name</th>
        <td *matCellDef="let user" mat-cell>{{ user.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="lastName">
        <th *matHeaderCellDef mat-header-cell>Last Name</th>
        <td *matCellDef="let user" mat-cell>{{ user.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th *matHeaderCellDef mat-header-cell>Email</th>
        <td *matCellDef="let user" mat-cell>{{ user.credentials.email }}</td>
      </ng-container>

      <ng-container matColumnDef="role">
        <th *matHeaderCellDef mat-header-cell>Role</th>
        <td *matCellDef="let user" mat-cell>{{ user.role }}</td>
      </ng-container>

      <ng-container matColumnDef="state">
        <th *matHeaderCellDef mat-header-cell>State</th>
        <td *matCellDef="let user" mat-cell>{{ user.state }}</td>
      </ng-container>

      <tr *matHeaderRowDef="columns()" mat-header-row></tr>
      <tr *matRowDef="let row; columns: columns()" mat-row></tr>
    </table>
  </mat-card-content>
</mat-card>
