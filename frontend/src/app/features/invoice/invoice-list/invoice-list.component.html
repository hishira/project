<app-page-header>
  <div class="header main-header">
    <h1>Faktury</h1>
  </div>
  <div class="main-header-buttons">
    <button mat-raised-button color="primary" (click)="onAdd()">
      <mat-icon>add</mat-icon> Nowa faktura
    </button>
  </div>
</app-page-header>

<app-main-page-view>
  <div class="list-container">
    <!-- Filtry -->
    <app-invoice-filters
      [filterNumber]="filterNumber()"
      [filterClient]="filterClient()"
      [filterStatus]="filterStatus()"
      (filterNumberChange)="onFilterNumberChange($event)"
      (filterClientChange)="onFilterClientChange($event)"
      (filterStatusChange)="onFilterStatusChange($event)"
      (clearFilters)="clearFilters()" />

    <!-- Tabela faktur -->
    <mat-card>
      <mat-card-content>
        <table mat-table [dataSource]="dataSource()" matSort class="invoice-table">
          <ng-container matColumnDef="number">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="number">Numer</th>
            <td mat-cell *matCellDef="let inv">
              <a [routerLink]="[inv.id]" class="invoice-number">{{ inv.number }}</a>
            </td>
          </ng-container>

          <ng-container matColumnDef="client">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="clientName">Klient</th>
            <td mat-cell *matCellDef="let inv">{{ inv.clientName }}</td>
          </ng-container>

          <ng-container matColumnDef="issueDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="issueDate">Data wystawienia</th>
            <td mat-cell *matCellDef="let inv">{{ inv.issueDate | date: 'dd MMM yyyy' }}</td>
          </ng-container>

          <ng-container matColumnDef="dueDate">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="dueDate">Termin płatności</th>
            <td mat-cell *matCellDef="let inv">
              <span [class.overdue]="inv.status === 'overdue'">{{ inv.dueDate | date: 'dd MMM yyyy' }}</span>
            </td>
          </ng-container>

          <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="totalGross">Kwota</th>
            <td mat-cell *matCellDef="let inv">{{ inv.totalGross | number: '1.2-2' }} {{ inv.currency }}</td>
          </ng-container>

          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef mat-sort-header="status">Status</th>
            <td mat-cell *matCellDef="let inv">
              <app-invoice-status-chip [status]="inv.status" />
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let inv">
              <app-invoice-actions
                [invoice]="inv"
                (view)="onAdd()"
                (edit)="onEdit(inv)"
                (delete)="onDelete(inv)" />
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns"
            [routerLink]="[row.id]"
            class="clickable-row"></tr>

          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" [attr.colspan]="displayedColumns.length">
              <div class="no-data">Brak faktur spełniających kryteria</div>
            </td>
          </tr>
        </table>

        <mat-paginator [pageSizeOptions]="[5, 10, 25, 50]" showFirstLastButtons></mat-paginator>
      </mat-card-content>
    </mat-card>
  </div>
</app-main-page-view>
