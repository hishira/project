@let item = sideNavElement();

<a class="nav-item" routerLink="{{ item.link }}" (click)="close()">
  <div class="nav-item-icon-wrapper">
    <mat-icon class="nav-item-icon">{{ item.icon }}</mat-icon>
  </div>
  <span class="nav-item-text">{{ item.title }}</span>
</a>
@if (item.isLastInSection) {
  <div class="nav-divider"></div>
}
