<div class="app-container">
  <mat-drawer-container class="drawer-container" autosize>
    <mat-drawer class="side-nav" mode="over" position="start" [opened]="drawerOpened()" (closed)="close()">
      <app-side-nav-v2 (closed)="close()" />
    </mat-drawer>

    <div class="main-content">
      <app-toolbar (menuToggle)="toggleDrawer()" />
      <router-outlet />
    </div>
  </mat-drawer-container>
</div>
