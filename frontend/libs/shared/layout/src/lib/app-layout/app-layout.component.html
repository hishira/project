<div class="app-container">
  <mat-drawer-container class="drawer-container" autosize>
    <mat-drawer class="side-nav" mode="over" position="start" [opened]="drawerOpened" (closed)="drawerOpened = false">
      <app-side-nav (closed)="drawerOpened = false" />
    </mat-drawer>

    <div class="main-content">
      <app-toolbar (menuToggle)="toggleDrawer()" />
      <router-outlet />
    </div>
  </mat-drawer-container>
</div>
